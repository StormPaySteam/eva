<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Админ — EVA Цветочный Магазин</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { background: var(--bg, #fdf0f3); }
    .admin-layout { display:grid; grid-template-columns:240px 1fr; min-height:100vh; padding-top:72px; }
    .admin-sidebar { background:var(--white); border-right:1px solid var(--pink-light); padding:28px 0; position:sticky; top:72px; height:calc(100vh - 72px); overflow-y:auto; }
    .admin-brand { padding:0 24px 24px; border-bottom:1px solid var(--pink-light); margin-bottom:16px; }
    .admin-brand h2 { font-family:var(--font-display); font-size:1.2rem; color:var(--pink); margin:0 0 4px; }
    .admin-brand p { font-size:.78rem; color:var(--gray); margin:0; }
    .admin-nav-btn { display:flex; align-items:center; gap:10px; width:100%; padding:12px 24px; border:none; background:none; font-family:var(--font-body); font-size:.9rem; color:var(--dark); cursor:pointer; text-align:left; transition:var(--transition); border-left:3px solid transparent; }
    .admin-nav-btn:hover, .admin-nav-btn.active { background:var(--pink-pale); color:var(--pink); border-left-color:var(--pink); font-weight:500; }
    .nav-badge { margin-left:auto; background:var(--pink); color:#fff; font-size:.7rem; padding:2px 7px; border-radius:30px; min-width:20px; text-align:center; }
    .admin-main { padding:32px; overflow-y:auto; }
    .admin-page { display:none; }
    .admin-page.active { display:block; }
    .admin-page-title { font-family:var(--font-display); font-size:1.6rem; color:var(--dark); margin:0 0 24px; }
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; margin-bottom:32px; }
    .stat-card { background:var(--white); border:1px solid var(--pink-light); border-radius:16px; padding:20px 24px; }
    .stat-label { font-size:.78rem; color:var(--gray); margin-bottom:8px; text-transform:uppercase; letter-spacing:.05em; }
    .stat-value { font-size:2rem; font-weight:700; color:var(--pink); font-family:var(--font-display); }
    .admin-filters { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
    .filter-btn { padding:8px 18px; border-radius:30px; border:1px solid var(--pink-light); background:var(--white); font-family:var(--font-body); font-size:.85rem; cursor:pointer; transition:var(--transition); color:var(--dark); }
    .filter-btn:hover, .filter-btn.active { background:var(--pink); color:#fff; border-color:var(--pink); }
    .admin-search { display:flex; gap:10px; margin-bottom:20px; }
    .admin-search input { flex:1; padding:10px 16px; border:1px solid var(--pink-light); border-radius:10px; font-family:var(--font-body); font-size:.9rem; background:var(--white); outline:none; }
    .admin-search input:focus { border-color:var(--pink); }
    .admin-order-card { background:var(--white); border:1px solid var(--pink-light); border-radius:16px; padding:20px 24px; margin-bottom:14px; }
    .aoc-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
    .aoc-id { font-size:.8rem; color:var(--gray); font-family:monospace; }
    .aoc-date { font-size:.82rem; color:var(--gray); }
    .aoc-body { margin-bottom:14px; }
    .aoc-customer { display:flex; gap:20px; flex-wrap:wrap; margin-bottom:10px; }
    .aoc-customer span { font-size:.85rem; color:var(--dark); }
    .aoc-customer span strong { color:var(--pink); }
    .aoc-items { font-size:.83rem; color:var(--gray); }
    .aoc-total { font-size:1.1rem; font-weight:700; color:var(--pink); }
    .aoc-address, .aoc-delivery-time { font-size:.82rem; color:var(--gray); margin-top:4px; }
    .aoc-note { font-size:.82rem; color:var(--gray); font-style:italic; margin-top:6px; background:var(--pink-pale); padding:8px 12px; border-radius:8px; }
    .aoc-footer { display:flex; align-items:center; gap:10px; flex-wrap:wrap; border-top:1px solid var(--pink-light); padding-top:14px; }
    .status-select { padding:8px 14px; border-radius:30px; border:1px solid var(--pink-light); font-family:var(--font-body); font-size:.82rem; background:var(--white); cursor:pointer; outline:none; }
    .upload-photo-btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; background:var(--pink-pale); color:var(--pink); border:1px solid var(--pink-light); border-radius:30px; font-size:.82rem; cursor:pointer; font-family:var(--font-body); transition:var(--transition); }
    .upload-photo-btn:hover { background:var(--pink); color:#fff; }
    .aoc-photo { margin:12px 0; }
    .aoc-photo img { max-width:180px; border-radius:10px; border:2px solid var(--pink-light); }
    .aoc-photo-label { font-size:.75rem; color:var(--gray); margin-bottom:6px; }
    .badge { padding:4px 12px; border-radius:30px; font-size:.78rem; font-weight:500; white-space:nowrap; }
    .badge-pending  { background:#fff3cd; color:#856404; }
    .badge-assembly { background:#cff4fc; color:#055160; }
    .badge-delivery { background:#d1e7dd; color:#0a3622; }
    .badge-done     { background:#d1ecf1; color:#0c5460; }

    /* Products */
    .products-toolbar { display:flex; gap:12px; align-items:center; margin-bottom:20px; }
    .admin-product-row { display:flex; align-items:center; gap:14px; padding:14px 18px; background:var(--white); border:1px solid var(--pink-light); border-radius:14px; margin-bottom:10px; transition:var(--transition); }
    .admin-product-row:hover { box-shadow:var(--shadow); }
    .admin-product-row.inactive { opacity:.55; }
    .apc-img { width:54px; height:54px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.8rem; flex-shrink:0; overflow:hidden; }
    .apc-img img { width:100%; height:100%; object-fit:cover; }
    .apc-info { flex:1; min-width:0; }
    .apc-name { font-weight:500; font-size:.95rem; }
    .apc-cat { font-size:.78rem; color:var(--pink); margin-top:2px; }
    .apc-desc { font-size:.78rem; color:var(--gray); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .apc-price { font-weight:600; color:var(--pink); min-width:90px; text-align:right; font-size:.95rem; flex-shrink:0; }
    .apc-actions { display:flex; gap:6px; flex-shrink:0; }
    .apc-btn { width:32px; height:32px; border-radius:8px; border:1px solid var(--pink-light); background:var(--pink-pale); cursor:pointer; font-size:.85rem; display:flex; align-items:center; justify-content:center; transition:var(--transition); }
    .apc-btn:hover { background:var(--pink); border-color:var(--pink); }
    .apc-btn.del:hover { background:#e74c3c; border-color:#e74c3c; }

    /* Product form */
    .product-form-wrap { background:var(--white); border:1.5px dashed var(--pink); border-radius:18px; padding:28px; margin-top:20px; display:none; flex-direction:column; gap:16px; }
    .product-form-wrap h4 { font-family:var(--font-display); font-size:1.1rem; color:var(--dark); margin:0; }
    .pf-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .pf-full { grid-column:1/-1; }
    .pf-field { display:flex; flex-direction:column; gap:6px; }
    .pf-field label { font-size:.8rem; color:var(--gray); font-weight:500; }
    .pf-field input, .pf-field select, .pf-field textarea { padding:10px 14px; border:1px solid var(--pink-light); border-radius:10px; font-family:var(--font-body); font-size:.9rem; outline:none; background:var(--white); }
    .pf-field input:focus, .pf-field select:focus, .pf-field textarea:focus { border-color:var(--pink); }
    .pf-image-row { display:flex; gap:14px; align-items:flex-start; }
    .pf-image-preview { width:80px; height:80px; border-radius:12px; border:2px dashed var(--pink-light); display:flex; align-items:center; justify-content:center; overflow:hidden; font-size:.75rem; color:var(--gray); text-align:center; flex-shrink:0; }
    .pf-image-preview img { width:100%; height:100%; object-fit:cover; }
    .pf-image-upload { display:flex; flex-direction:column; gap:8px; }
    .pf-image-upload label { display:inline-flex; align-items:center; gap:8px; padding:10px 18px; background:var(--pink-pale); color:var(--pink); border:1px solid var(--pink-light); border-radius:30px; font-size:.85rem; cursor:pointer; font-family:var(--font-body); transition:var(--transition); width:fit-content; }
    .pf-image-upload label:hover { background:var(--pink); color:#fff; }
    .pf-form-btns { display:flex; gap:12px; }
    .admin-empty { text-align:center; padding:60px 20px; color:var(--gray); }
    .admin-empty .em-icon { font-size:3rem; margin-bottom:16px; }
    .admin-loading { text-align:center; padding:60px; color:var(--gray); }

    @media (max-width:900px) {
      .admin-layout { grid-template-columns:1fr; }
      .admin-sidebar { position:static; height:auto; }
      .admin-main { padding:20px 16px; }
      .pf-grid { grid-template-columns:1fr; }
      .pf-full { grid-column:unset; }
    }
  </style>
</head>
<body>

<header id="header">
  <div class="header-inner">
    <a href="index.html" class="logo-wrap">
      <img src="logo.png" alt="EVA" class="logo-img" onerror="this.style.display='none'"/>
      <span class="logo-text" style="display:none">EVA</span>
    </a>
    <nav class="nav"><a href="index.html">← Магазин</a></nav>
    <div class="header-actions">
      <button class="icon-btn" id="logoutBtn" title="Выйти">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-brand">
      <h2>🌸 Админ-панель</h2>
      <p id="adminEmail">Загрузка…</p>
    </div>
    <button class="admin-nav-btn active" data-page="dashboard">📊 Дашборд</button>
    <button class="admin-nav-btn" data-page="orders">
      📦 Заказы <span class="nav-badge" id="pendingBadge">0</span>
    </button>
    <button class="admin-nav-btn" data-page="products">🌸 Товары</button>
    <button class="admin-nav-btn" data-page="customers">👥 Клиенты</button>
  </aside>

  <main class="admin-main">

    <!-- DASHBOARD -->
    <div class="admin-page active" id="page-dashboard">
      <h2 class="admin-page-title">Дашборд</h2>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Всего заказов</div><div class="stat-value" id="stat-total">—</div></div>
        <div class="stat-card"><div class="stat-label">Ожидают</div><div class="stat-value" id="stat-pending">—</div></div>
        <div class="stat-card"><div class="stat-label">В доставке</div><div class="stat-value" id="stat-delivery">—</div></div>
        <div class="stat-card"><div class="stat-label">Выручка</div><div class="stat-value" id="stat-revenue">—</div></div>
      </div>
      <h3 style="font-family:var(--font-display);font-size:1.1rem;margin-bottom:16px">Новые заказы</h3>
      <div id="dashNewOrders"><div class="admin-loading">Загрузка…</div></div>
    </div>

    <!-- ORDERS -->
    <div class="admin-page" id="page-orders">
      <h2 class="admin-page-title">Заказы</h2>
      <div class="admin-filters" id="orderFilters">
        <button class="filter-btn active" data-status="all">Все</button>
        <button class="filter-btn" data-status="pending">🕐 Новые</button>
        <button class="filter-btn" data-status="assembly">🌿 Сборка</button>
        <button class="filter-btn" data-status="delivery">🚚 Доставка</button>
        <button class="filter-btn" data-status="done">✅ Выполнены</button>
      </div>
      <div class="admin-search">
        <input type="text" id="orderSearch" placeholder="Поиск по имени, телефону, адресу…" oninput="filterOrders()"/>
      </div>
      <div id="ordersListAdmin"><div class="admin-loading">Загрузка заказов…</div></div>
    </div>

    <!-- PRODUCTS -->
    <div class="admin-page" id="page-products">
      <h2 class="admin-page-title">Товары</h2>
      <div class="products-toolbar">
        <button class="btn-primary small" id="addProductBtn">+ Добавить товар</button>
      </div>

      <!-- Add/Edit form -->
      <div class="product-form-wrap" id="productForm">
        <h4 id="productFormTitle">Новый товар</h4>
        <div class="pf-grid">
          <div class="pf-field pf-full">
            <label>Фото из галереи</label>
            <div class="pf-image-row">
              <div class="pf-image-preview" id="pf_imagePreview"><span>Фото не выбрано</span></div>
              <div class="pf-image-upload">
                <label>
                  📷 Выбрать из галереи
                  <input type="file" id="pf_image" accept="image/*" style="display:none"/>
                </label>
                <span style="font-size:.75rem;color:var(--gray)">JPG, PNG, WebP — до 5 МБ</span>
              </div>
            </div>
          </div>
          <div class="pf-field pf-full">
            <label>Название *</label>
            <input type="text" id="pf_name" placeholder="Букет роз"/>
          </div>
          <div class="pf-field pf-full">
            <label>Описание</label>
            <input type="text" id="pf_desc" placeholder="Нежный букет из 15 роз…"/>
          </div>
          <div class="pf-field">
            <label>Цена ₽ *</label>
            <input type="number" id="pf_price" placeholder="2500" min="0" step="50"/>
          </div>
          <div class="pf-field">
            <label>Категория</label>
            <select id="pf_cat">
              <option value="flowers">🌸 Цветы</option>
              <option value="balloons">🎈 Шары</option>
              <option value="toys">🧸 Игрушки</option>
            </select>
          </div>
          <div class="pf-field">
            <label>Эмодзи (если нет фото)</label>
            <input type="text" id="pf_emoji" placeholder="🌹" maxlength="4"/>
          </div>
          <div class="pf-field">
            <label>Цвет карточки</label>
            <input type="color" id="pf_color" value="#ffd5dc" style="height:42px;padding:4px 8px;"/>
          </div>
        </div>
        <div class="pf-form-btns">
          <button class="btn-primary" id="saveProductBtn">Сохранить</button>
          <button class="btn-ghost" id="cancelProductBtn">Отмена</button>
        </div>
      </div>

      <div id="productsList"><div class="admin-loading">Загрузка товаров…</div></div>
    </div>

    <!-- CUSTOMERS -->
    <div class="admin-page" id="page-customers">
      <h2 class="admin-page-title">Клиенты</h2>
      <div id="customersList"><div class="admin-loading">Загрузка…</div></div>
    </div>

  </main>
</div>

<div class="toast" id="toast"></div>
<script type="module" src="admin.js"></script>
</body>
</html>
